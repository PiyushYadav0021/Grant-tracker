<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grant-Grabber | AI Grant Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #2563eb;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">

    <div class="max-w-xl w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
        
        <div class="text-center">
            <div class="mx-auto h-12 w-12 bg-blue-100 rounded-full flex items-center justify-center mb-4">
                <span class="text-2xl">💸</span>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Grant-Grabber</h1>
            <p class="mt-2 text-gray-600">Upload your resume to instantly match with funding.</p>
        </div>

        <div class="space-y-4">
            <div class="flex justify-center px-6 pt-5 pb-6 border-2 border-dashed border-gray-300 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition cursor-pointer group" id="dropZone">
                <div class="space-y-1 text-center">
                    <svg class="mx-auto h-12 w-12 text-gray-400 group-hover:text-blue-500 transition" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <div class="text-sm text-gray-600">
                        <label for="file-upload" class="relative cursor-pointer font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none">
                            <span>Click to Upload Resume</span>
                            <input id="file-upload" name="file-upload" type="file" accept="application/pdf" class="sr-only">
                        </label>
                    </div>
                    <p class="text-xs text-gray-500">PDF files only</p>
                    <p id="fileName" class="text-sm font-semibold text-gray-900 mt-2 hidden"></p>
                </div>
            </div>

            <button id="findGrantsBtn" class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition">
                <span>Find Matches</span>
            </button>
        </div>

        <div id="loading" class="hidden flex flex-col items-center justify-center py-6">
            <div class="spinner mb-3"></div>
            <p class="text-sm text-gray-500 animate-pulse">Analyzing resume & searching grant database...</p>
        </div>

        <div id="results" class="hidden text-left space-y-4 text-gray-700 bg-gray-50 p-6 rounded-xl border border-gray-200 text-sm leading-relaxed">
            </div>

    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // CONFIGURATION
        const API_KEY = "AIzaSyBgeAbujIdae8US6031QFyjZ1IgYdLcdiM"; // Your Key
        const MODEL_NAME = "gemini-2.5-flash"; // Updated for 2026 stability

        const fileInput = document.getElementById('file-upload');
        const fileNameDisplay = document.getElementById('fileName');
        const findBtn = document.getElementById('findGrantsBtn');
        const loadingDiv = document.getElementById('loading');
        const resultsDiv = document.getElementById('results');

        let selectedFile = null;

        // Handle File Selection
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                fileNameDisplay.textContent = `📄 ${file.name}`;
                fileNameDisplay.classList.remove('hidden');
                // Auto-enable button style if needed
            }
        });

        // Convert PDF to Base64 for Gemini
        function fileToGenerativePart(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64Data = reader.result.split(',')[1];
                    resolve({
                        inlineData: {
                            data: base64Data,
                            mimeType: file.type
                        }
                    });
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // Main Button Logic
        findBtn.addEventListener('click', async () => {
            if (!selectedFile) {
                alert("Please upload your resume PDF first.");
                return;
            }

            // UI Updates: Show loading, hide old results
            findBtn.disabled = true;
            findBtn.innerHTML = "Processing...";
            loadingDiv.classList.remove('hidden');
            resultsDiv.classList.add('hidden');
            resultsDiv.innerHTML = '';

            try {
                const genAI = new GoogleGenerativeAI(API_KEY);
                const model = genAI.getGenerativeModel({ model: MODEL_NAME });

                const prompt = `
                    You are a professional grant consultant. Analyze the attached resume PDF.
                    Identify the user's key strengths, career stage, and field.
                    
                    Suggest 3 specific, real-world grants or fellowships they should apply for.
                    
                    Output HTML ONLY (no markdown backticks). Use this format for each grant:
                    <div class="mb-6 pb-6 border-b border-gray-200 last:border-0">
                        <h3 class="text-lg font-bold text-blue-800 mb-1">1. [Grant Name]</h3>
                        <p class="text-sm font-semibold text-green-600 mb-2">💰 [Amount]</p>
                        <p class="mb-3"><strong>Why:</strong> [One sentence match explanation]</p>
                        <div class="bg-white p-3 rounded border border-gray-300 text-xs text-gray-600">
                            <strong>Draft Interest Statement:</strong><br/>
                            "[50 word professional draft]"
                        </div>
                    </div>
                `;

                const filePart = await fileToGenerativePart(selectedFile);
                
                // Call Gemini
                const result = await model.generateContent([prompt, filePart]);
                const response = await result.response;
                const text = response.text();

                // Clean up any stray markdown formatting if Gemini adds it
                const cleanHtml = text.replace(/```html/g, '').replace(/```/g, '');
                
                resultsDiv.innerHTML = cleanHtml;
                resultsDiv.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                let msg = "An error occurred.";
                
                // Friendly error handling
                if (error.message.includes("404")) msg = "Model Error: Please check API version.";
                if (error.message.includes("400")) msg = "Invalid API Key or Bad Request.";
                
                alert(msg + "\n(Details: " + error.message + ")");
            } finally {
                loadingDiv.classList.add('hidden');
                findBtn.disabled = false;
                findBtn.innerHTML = "Find Matches";
            }
        });
    </script>
</body>
</html>
